server_name: "gtt.local"
pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: false
    resources:
      - names: [client, federation]
        compress: false

database:
  name: sqlite3
  args:
    database: /data/homeserver.db

log_config: /data/gtt.log.config

media_store_path: /data/media_store

registration_shared_secret: "gtt-import-secret-change-me"

report_stats: false

signing_key_path: /data/gtt.local.signing.key

trusted_key_servers:
  - server_name: "matrix.org"

# Allow registration for the import script
enable_registration: true
enable_registration_without_verification: true

# Disable rate limiting for bulk import
rc_message:
  per_second: 1000
  burst_count: 10000

rc_registration:
  per_second: 1000
  burst_count: 10000

rc_joins:
  local:
    per_second: 1000
    burst_count: 10000

# Allow admin API
allow_public_rooms_without_auth: true

# Enable MSC2716 batch send for historical import
experimental_features:
  msc2716_enabled: true

# Register import script as application service
app_service_config_files:
  - /data/import-appservice.yaml